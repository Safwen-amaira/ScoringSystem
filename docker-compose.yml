services:
  threat-recommendation-engine:
    build: .
    container_name: threat-recommendation-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_SENDER: ${SMTP_SENDER:-soc-automation@example.local}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      HANICAR_ADMIN_EMAIL: ${HANICAR_ADMIN_EMAIL:-admin@hanicar.tn}
      HANICAR_ADMIN_PASSWORD: ${HANICAR_ADMIN_PASSWORD:-bornasroot}
      HANICAR_DATA_DIR: ${HANICAR_DATA_DIR:-/app/data}
      AI_PROVIDER: ${AI_PROVIDER:-file-agent}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
    volumes:
      - hanicar_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  hanicar-dashboard:
    build:
      context: ./dashboard
    container_name: hanicar-dashboard
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      threat-recommendation-engine:
        condition: service_healthy

volumes:
  hanicar_data:
    driver: local